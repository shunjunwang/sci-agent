services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sciagent-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sciagent-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./sci_agent.db"
      DEBUG: "true"
    volumes:
      - ./backend/sci_agent.db:/app/sci_agent.db