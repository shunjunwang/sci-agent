name: CI

on:
  push:
    branches: [feature/*, fix/*, refactor/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt mypy ruff bandit

      - name: Ruff check
        run: ruff check --config ../pyproject.toml .

      - name: Mypy type check
        run: mypy --config-file ../pyproject.toml -p backend

      - name: Bandit security scan
        run: bandit -c ../pyproject.toml -r . -x tests -ll
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        run: pytest -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=60
