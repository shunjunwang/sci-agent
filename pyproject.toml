# ─── Ruff (Lint + Format) ───
[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["backend/migrations/", "backend/tests/"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "ASYNC", # flake8-async (catches async def without await)
]
ignore = [
    "E501", # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ─── MyPy ───
[tool.mypy]
# Strict mode is too noisy for this codebase (~800+ errors).
# Use targeted checks that catch the most impactful issues.
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
ignore_missing_imports = true
exclude = ["backend/tests/", "backend/migrations/", "backend/test_deps2.py"]
plugins = ["pydantic.mypy"]

# ─── Bandit ───
[tool.bandit]
exclude_dirs = ["backend/tests", "backend/migrations"]

# ─── Pytest ───
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
python_files = "test_*.py"
addopts = "-v --tb=short"
